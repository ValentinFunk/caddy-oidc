name: Integration Test
on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run E2E Stack
        run: |
          mkdir -p e2e/results
          docker buildx bake --allow=fs.read=.. -f e2e/docker-compose.yml --load --set *.cache-from=type=gha --set *.cache-to=type=gha,mode=max
          docker compose -f e2e/docker-compose.yml up --abort-on-container-exit --attach-dependencies --exit-code-from test

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            e2e/results/*.xml
